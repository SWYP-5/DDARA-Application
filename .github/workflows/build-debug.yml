# Debug 빌드 → Firebase App Distribution 배포 (QA용)
#
# 산출물: Android 디버그 APK / iOS Development 서명 IPA → 그룹 qa 에 OTA 배포.
# 가이드: .github/setup-debug-cicd.md, .github/research-debug.md
#
# 시크릿 인코딩 규약 (등록 시 이 규약대로 넣어야 함):
#   [base64]  GOOGLE_SERVICES_JSON, GOOGLE_SERVICE_INFO_PLIST,
#             IOS_CERTIFICATE_P12, IOS_PROVISIONING_PROFILE, FIREBASE_SERVICE_ACCOUNT
#   [원문]     ENV_FILE, IOS_SECRETS_XCCONFIG
#   [평문]     KAKAO_NATIVE_APP_KEY, IOS_TEAM_ID, IOS_CERTIFICATE_PASSWORD,
#             IOS_KEYCHAIN_PASSWORD, FIREBASE_APP_ID_IOS, FIREBASE_APP_ID_ANDROID

name: build-debug

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '빌드 대상'
        type: choice
        options: [all, android, ios]
        default: all
  # 안정화 후 주석 해제 → dev 머지 시 자동 빌드
  # push:
  #   branches: [dev]

concurrency:
  group: build-debug-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  # ─────────────────────────────── Android ───────────────────────────────
  android:
    name: Android Debug APK
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 시크릿 파일 복원
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          KAKAO_NATIVE_APP_KEY: ${{ secrets.KAKAO_NATIVE_APP_KEY }}
        run: |
          printf '%s' "$ENV_FILE" > .env
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          # build.gradle 이 KAKAO 키를 참조하는 경우 대비 (manifestPlaceholders)
          echo "KAKAO_NATIVE_APP_KEY=$KAKAO_NATIVE_APP_KEY" >> android/local.properties

      - name: 의존성 설치
        run: flutter pub get

      - name: APK 빌드 (debug)
        run: flutter build apk --debug

      - name: Firebase 서비스 계정 복원 (base64 → JSON 파일)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" | base64 --decode > "$RUNNER_TEMP/firebase-sa.json"
          echo "FIREBASE_SA=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Firebase App Distribution 업로드
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFile: ${{ env.FIREBASE_SA }}
          groups: qa
          file: build/app/outputs/flutter-apk/app-debug.apk

  # ───────────────────────────────── iOS ─────────────────────────────────
  ios:
    name: iOS Development IPA
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'ios' }}
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 시크릿 파일 복원
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          IOS_SECRETS_XCCONFIG: ${{ secrets.IOS_SECRETS_XCCONFIG }}
        run: |
          printf '%s' "$ENV_FILE" > .env
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
          printf '%s' "$IOS_SECRETS_XCCONFIG" > ios/Flutter/Secrets.xcconfig

      - name: 서명 자산 설치 (인증서 + 프로파일)
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT=$RUNNER_TEMP/cert.p12
          PROFILE=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN=$RUNNER_TEMP/build.keychain

          echo "$IOS_CERTIFICATE_P12" | base64 --decode > "$CERT"
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE"

          # 임시 키체인 생성 + 인증서 import
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # 프로비저닝 프로파일 배치
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: 수동 서명 설정 주입 (ExportOptions + Release.xcconfig)
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          # export 단계용: ExportOptions.plist 의 Team ID 치환
          sed -i '' "s/__IOS_TEAM_ID__/$IOS_TEAM_ID/" ios/ExportOptions.plist
          # archive 단계용: 수동 서명 설정을 Release.xcconfig 에 주입 (pbxproj 미변경)
          {
            echo "CODE_SIGN_STYLE = Manual"
            echo "DEVELOPMENT_TEAM = $IOS_TEAM_ID"
            echo "PROVISIONING_PROFILE_SPECIFIER = ddara-team3"
          } >> ios/Flutter/Release.xcconfig

      - name: 의존성 설치
        run: flutter pub get

      - name: IPA 빌드 (development 서명)
        run: flutter build ipa --export-options-plist=ios/ExportOptions.plist

      - name: IPA 경로 탐색
        run: echo "IPA_PATH=$(ls build/ios/ipa/*.ipa | head -n1)" >> "$GITHUB_ENV"

      - name: Firebase 서비스 계정 복원 (base64 → JSON 파일)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" | base64 --decode > "$RUNNER_TEMP/firebase-sa.json"
          echo "FIREBASE_SA=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Firebase App Distribution 업로드
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_IOS }}
          serviceCredentialsFile: ${{ env.FIREBASE_SA }}
          groups: qa
          file: ${{ env.IPA_PATH }}
