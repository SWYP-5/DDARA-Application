# Debug 빌드 → Firebase App Distribution 배포 (QA용)
#
# 산출물: Android 디버그 APK / iOS Development 서명 IPA → 그룹 qa 에 OTA 배포.
# 가이드: .github/setup-debug-cicd.md, .github/research-debug.md
#
# 시크릿 인코딩 규약 (등록 시 이 규약대로 넣어야 함):
#   [base64]  GOOGLE_SERVICES_JSON, GOOGLE_SERVICE_INFO_PLIST,
#             IOS_CERTIFICATE_P12, IOS_PROVISIONING_PROFILE, FIREBASE_SERVICE_ACCOUNT
#   [원문]     ENV_FILE, IOS_SECRETS_XCCONFIG
#   [평문]     KAKAO_NATIVE_APP_KEY, IOS_TEAM_ID, IOS_CERTIFICATE_PASSWORD,
#             IOS_KEYCHAIN_PASSWORD, FIREBASE_APP_ID_IOS, FIREBASE_APP_ID_ANDROID

name: build-debug

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '빌드 대상'
        type: choice
        options: [ all, android, ios ]
        default: all

  push:
    branches: [ dev ]

concurrency:
  group: build-debug-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  # ─────────────────────────────── Android ───────────────────────────────
  android:
    name: Android Debug APK
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 시크릿 파일 복원
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          KAKAO_NATIVE_APP_KEY: ${{ secrets.KAKAO_NATIVE_APP_KEY }}
        run: |
          printf '%s' "$ENV_FILE" > .env
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          # build.gradle 이 KAKAO 키를 참조하는 경우 대비 (manifestPlaceholders)
          echo "KAKAO_NATIVE_APP_KEY=$KAKAO_NATIVE_APP_KEY" >> android/local.properties

      - name: 의존성 설치
        run: flutter pub get

      - name: APK 빌드 (debug)
        # 빌드 번호를 run_number 로 주입해 실행마다 자동 증가. (pubspec 은 변경 안 함)
        run: flutter build apk --debug --build-number=${{ github.run_number }}

      - name: Firebase 서비스 계정 복원 (base64 → JSON 파일)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" | base64 --decode > "$RUNNER_TEMP/firebase-sa.json"
          echo "FIREBASE_SA=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Firebase App Distribution 업로드
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFile: ${{ env.FIREBASE_SA }}
          groups: qa
          file: build/app/outputs/flutter-apk/app-debug.apk

  # ───────────────────────────────── iOS ─────────────────────────────────
  ios:
    name: iOS Development IPA
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'ios' }}
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 시크릿 파일 복원
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
          IOS_SECRETS_XCCONFIG: ${{ secrets.IOS_SECRETS_XCCONFIG }}
        run: |
          printf '%s' "$ENV_FILE" > .env
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
          printf '%s' "$IOS_SECRETS_XCCONFIG" > ios/Flutter/Secrets.xcconfig

      - name: 서명 자산 설치 (인증서 + 프로파일)
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERT=$RUNNER_TEMP/cert.p12
          PROFILE=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN=$RUNNER_TEMP/build.keychain

          echo "$IOS_CERTIFICATE_P12" | base64 --decode > "$CERT"
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE"

          # 임시 키체인 생성 + 인증서 import
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # 프로비저닝 프로파일 배치
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: 수동 서명 설정 주입 (ExportOptions + Release.xcconfig)
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          # export 단계용: ExportOptions.plist 의 Team ID 치환
          sed -i '' "s/__IOS_TEAM_ID__/$IOS_TEAM_ID/" ios/ExportOptions.plist
          # archive 단계용: 수동 서명 설정을 Release.xcconfig 에 주입 (pbxproj 미변경)
          {
            echo "CODE_SIGN_STYLE = Manual"
            echo "DEVELOPMENT_TEAM = $IOS_TEAM_ID"
            echo "PROVISIONING_PROFILE_SPECIFIER = ddara-team3"
          } >> ios/Flutter/Release.xcconfig

      - name: 의존성 설치
        run: flutter pub get

      - name: IPA 빌드 (development 서명)
        # Firebase SPM 바이너리(grpc.zip 등) 다운로드가 간헐적으로 끊겨 재시도.
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 20
          # 빌드 번호를 run_number 로 주입해 실행마다 자동 증가. (pubspec 은 변경 안 함)
          command: flutter build ipa --build-number=${{ github.run_number }} --export-options-plist=ios/ExportOptions.plist

      - name: IPA 경로 탐색
        run: echo "IPA_PATH=$(ls build/ios/ipa/*.ipa | head -n1)" >> "$GITHUB_ENV"

      - name: Firebase 서비스 계정 복원 (base64 → JSON 파일)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" | base64 --decode > "$RUNNER_TEMP/firebase-sa.json"
          echo "FIREBASE_SA=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      # wzieba 액션은 Docker(컨테이너) 라 Linux 전용 → macOS 러너에선 Firebase CLI 직접 사용.
      - name: Firebase App Distribution 업로드 (CLI)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.FIREBASE_SA }}
        run: |
          npm install -g firebase-tools
          firebase appdistribution:distribute "$IPA_PATH" \
            --app "${{ secrets.FIREBASE_APP_ID_IOS }}" \
            --groups qa

      # Crashlytics 심볼화를 위해 dSYM 업로드. Firebase 는 SPM 으로 설치되므로
      # upload-symbols 는 DerivedData 의 SourcePackages 안에 있다.
      # 배포는 이미 끝난 뒤이므로, 업로드 실패가 배포를 막지 않도록 비차단 처리.
      - name: Crashlytics dSYM 업로드
        run: |
          # Firebase 설치 방식(SPM/Pods)에 무관하게 upload-symbols 를 이름으로 탐색.
          UPLOAD=$(find "$HOME/Library/Developer/Xcode/DerivedData" ios \
            -type f -name upload-symbols 2>/dev/null | head -n1)
          DSYMS=build/ios/archive/Runner.xcarchive/dSYMs
          if [ -z "$UPLOAD" ]; then
            echo "::warning::upload-symbols 를 찾지 못해 dSYM 업로드를 건너뜁니다."
            echo "--- 진단: Crashlytics 관련 파일 위치 ---"
            find "$HOME/Library/Developer/Xcode/DerivedData" ios \
              \( -name 'upload-symbols' -o -path '*Crashlytics/run' \) 2>/dev/null | head -20
            echo "--- 진단: SPM checkouts 목록 ---"
            find "$HOME/Library/Developer/Xcode/DerivedData" \
              -path '*SourcePackages/checkouts/*' -maxdepth 9 -type d 2>/dev/null | head -40
          elif [ ! -d "$DSYMS" ]; then
            echo "::warning::dSYM 폴더($DSYMS)가 없어 업로드를 건너뜁니다."
            echo "--- 진단: .xcarchive 위치 ---"
            find build -name '*.xcarchive' -o -name '*.dSYM' 2>/dev/null | head -20
          else
            echo "upload-symbols: $UPLOAD"
            "$UPLOAD" -gsp ios/Runner/GoogleService-Info.plist -p ios "$DSYMS" \
              || echo "::warning::dSYM 업로드 실패 (배포에는 영향 없음)."
          fi

  # ─────────────────────────── 배포 완료 알림 (Discord) ───────────────────────────
  notify:
    name: Discord 배포 알림
    # Android·iOS 배포가 모두 끝난 뒤 실행. (둘 다 성공해야 알림을 보낸다)
    needs: [ android, ios ]
    runs-on: ubuntu-latest
    steps:
      - name: 디스코드 알림 전송
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_DEBUG_CD_WEBHOOK_URL }}
        run: |
          curl -sS --fail-with-body -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "username": "QA봇",
              "content": "@everyone 새 배포가 완료되었습니다. 확인해주세요!!",
              "allowed_mentions": { "parse": ["everyone"] },
              "embeds": [
                {
                  "title": "앱 설치 방법",
                  "description": "https://app.notion.com/p/iOS-388a5ea4235480efba4cdab6f4f3310f",
                  "color": 5814783
                }
              ]
            }'
